</div>
<!-- Modal Container -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-gutter animate-in fade-in zoom-in-95 duration-200">
<!-- Modal Dialog -->
<div aria-labelledby="modal-title" aria-modal="true" class="w-full max-w-lg bg-surface border border-outline-variant rounded-xl shadow-2xl flex flex-col overflow-hidden relative" role="dialog">

<button aria-label="Close modal" class="absolute top-4 right-4 p-2 text-on-surface-variant hover:text-on-surface hover:bg-surface-container-highest rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-primary-fixed-dim">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
<!-- Header -->
<div class="px-6 py-6 border-b border-outline-variant/50">
<div class="flex items-center gap-3 mb-2">
<div class="w-8 h-8 rounded-full bg-error-container/20 flex items-center justify-center border border-error-container/30">
<span class="material-symbols-outlined text-error text-[18px]">feedback</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface" id="modal-title">Reject with feedback</h2>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant pl-11">
                    Tell the agent what's wrong — it will revise the quote and bring it back for approval.
                </p>
</div>
<!-- Body -->
<div class="p-6 flex flex-col gap-6 flex-grow overflow-y-auto">
<!-- Feedback Textarea -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="feedback-input">Feedback Instructions</label>
<textarea class="w-full bg-surface-container-low border border-outline-variant rounded-lg p-3 font-body-sm text-body-sm text-on-surface placeholder-on-surface-variant/50 focus:outline-none focus:border-tertiary-fixed-dim focus:ring-1 focus:ring-tertiary-fixed-dim transition-all resize-none shadow-[inset_0_2px_4px_rgba(0,0,0,0.2)]" id="feedback-input" placeholder="Price is too low for this scope — this client needs delivery zone logic." rows="4"></textarea>
</div>
<!-- Remember Rule Checkbox -->
<div class="flex items-start gap-3 mt-2 group cursor-pointer">
<div class="relative flex items-center mt-1">
<input checked="" class="peer h-4 w-4 shrink-0 rounded border-outline-variant bg-surface-container-low text-primary-fixed-dim focus:ring-primary-fixed-dim focus:ring-offset-surface cursor-pointer transition-colors" id="remember-rule" type="checkbox"/>
</div>
<label class="font-body-sm text-body-sm text-on-surface-variant group-hover:text-on-surface cursor-pointer transition-colors select-none" for="remember-rule">
                        Remember this as a pricing rule for future quotes
                    </label>
</div>
</div>
<!-- Footer -->
<div class="px-6 py-4 bg-surface-container-low/50 border-t border-outline-variant/50 flex justify-end gap-3 items-center">
<button class="px-4 py-2 rounded-lg font-label-md text-label-md text-on-surface-variant border border-transparent hover:border-outline-variant hover:bg-surface-container-highest focus:outline-none focus:ring-2 focus:ring-primary-fixed-dim transition-all" type="button">
                    Cancel
                </button>

<span class="material-symbols-outlined text-[16px]">send</span>
                    Send back to agent
                </button>
</div>

<script>
        // Auto-focus the textarea on load for immediate typing
        document.addEventListener('DOMContentLoaded', () => {
            const textarea = document.getElementById('feedback-input');
            if(textarea) {
                setTimeout(() => textarea.focus(), 100);
            }
        });
    </script>
